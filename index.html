<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Records Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <style>
        .header {
            background-color: #a2b5c8;
            padding: 15px;
            text-align: center;
            margin-bottom: 30px;
        }

        .main {
            display: flex;
            justify-content: space-around;
            gap: 20px;
            padding: 20px;
        }

        button {
            margin-top: 10px;
            padding: 10px 20px;
            width: 30%;
        }
        button:hover {
            background-color: #007bff;
            color: white;
        }
    </style>
</head>
<body>
    <div class="header container-fluid">
        <h1>Records Management</h1>
    </div>

    

    <div class="main">
        <div class="container card p-4 card-add-records">
            
            <label for="nameInput">Enter Your Name</label>
            <input type="text" id="nameInput" placeholder="Your Name">
            <br>
            <label for="emailInput">Enter Your Email</label>
            <input type="email" id="emailInput" placeholder="Your Email">
            <br>
            <label for="numberInput">Enter Your Phone</label>
            <input type="number" id="phoneInput" placeholder="Your Phone">
            <br>
            <label for="key">Enter Your key</label>
            <input type="text" id="key" placeholder="Your Key">
            <br>
            <button id="add" >Add Records</button>
        </div>

        <div class="container card p-4 card-get-records">
            
            <label for="nameInput">Enter The Key</label>
            <input type="text" id="keyInput" placeholder="The Key">
            <br>
            <label for="#">Result:</label>
            <label for="text" id="putResult"></label>
            <br>
            <button id="get">get Records</button>
        </div>
    </div>

    
    <script src="script.js"></script>
</body>
</html>
